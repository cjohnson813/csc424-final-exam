services:
  frontend:
    image: ghcr.io/cjohnson813/csc424-final-exam-frontend:latest
    restart: unless-stopped
    networks:
      - app-network

  backend:
    image: ghcr.io/cjohnson813/csc424-final-exam-backend:latest
    restart: unless-stopped
    networks:
      - app-network

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  app-network:
    driver: bridge
